<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Better delay (8 sec instead of 5) -->
  <meta http-equiv="refresh" content="8;url=index.html">

  <title>404 - Page Not Found</title>

  <!-- CSS -->
  <link rel="stylesheet" href="error.css">
</head>

<body>

<div class="container">

  <!-- Logo / Title -->
  <h2 class="logo">STACKLY IT Solutions</h2>

  <!-- Error Code -->
  <h1 class="error-code">404</h1>
  <h2>Page Not Found</h2>

  <!-- Message -->
  <p>
    Oops! The page you're looking for seems to have wandered off into the digital void.
    It might have been moved, deleted, or never existed.
  </p>

  <!-- Buttons -->
  <div class="buttons">
    <a href="index.html" class="btn primary">🏠 Go Back Home</a>
    <button onclick="history.back()" class="btn">⬅ Previous Page</button>

    <!-- ✅ FIX: Contact section instead of separate page -->
    <a href="index.html#contact" class="btn">📞 Contact Support</a>
  </div>

  <!-- Search (UI only) -->
  <div class="search-box">
    <input type="text" placeholder="Search pages, articles, or help...">
    <button onclick="goHome()">Search</button>
  </div>

</div>

<!-- JS -->
<script>
function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
