<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - STACKLY</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Additional styles for register page */
    .register-page {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .register-container {
      width: 100%;
      max-width: 500px;
    }

    .register-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      transition: transform 0.3s;
    }

    .register-card:hover {
      transform: translateY(-5px);
    }

    .register-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .register-header h2 {
      font-size: 32px;
      color: #1a1f2c;
      margin-bottom: 10px;
    }

    .register-header h2 span {
      color: #f97316;
    }

    .register-header p {
      color: #666;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }

    .input-group label i {
      margin-right: 8px;
      color: #f97316;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s;
      background: white;
    }

    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
    }

    .input-group input:hover,
    .input-group select:hover {
      border-color: #f97316;
    }

    .register-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .register-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(249,115,22,0.4);
    }

    .login-link {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      color: #666;
      font-size: 14px;
    }

    .login-link a {
      color: #f97316;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .back-home {
      text-align: center;
      margin-top: 15px;
    }

    .back-home a {
      color: #666;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .back-home a:hover {
      color: #f97316;
    }

    .password-strength {
      margin-top: 5px;
      font-size: 12px;
    }

    .strength-weak { color: #dc3545; }
    .strength-medium { color: #ffc107; }
    .strength-strong { color: #28a745; }

    @media (max-width: 768px) {
      .register-card {
        padding: 25px;
      }
      .register-header h2 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">
    <a href="index.html">
      <img src="logo.webp" alt="STACKLY Logo">
    </a>
  </div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <nav>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="careers.html">Careers</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>
</header>

<section class="register-page">
  <div class="register-container">
    <div class="register-card">
      <div class="register-header">
        <h2>Create <span>Account</span> ✨</h2>
        <p>Join STACKLY to get started</p>
      </div>

      <form onsubmit="event.preventDefault(); register();">
        <div class="input-group">
          <label><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="name" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
          <label><i class="fas fa-envelope"></i> Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" placeholder="Create a password" required onkeyup="checkPasswordStrength()">
          <div class="password-strength" id="passwordStrength"></div>
        </div>

        <div class="input-group">
          <label><i class="fas fa-user-tag"></i> Role</label>
          <select id="role">
            <option value="user">👤 User</option>
            <option value="admin">👑 Admin</option>
          </select>
        </div>

        <button type="submit" class="register-btn">Register →</button>

        <div class="login-link">
          Already have an account? <a href="login.html">Login here</a>
        </div>

        <div class="back-home">
          <a href="index.html">← Back to Home</a>
        </div>
      </form>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="quick-links">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="careers.html">Careers</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </div>
  <p>&copy; 2026 STACKLY IT Solutions. All rights reserved.</p>
</footer>

<script src="auth.js"></script>

<script>
  function toggleMenu() {
    const navLinks = document.querySelector('.nav-links');
    if (navLinks) {
      navLinks.classList.toggle('active');
    }
  }

  function checkPasswordStrength() {
    const password = document.getElementById('password').value;
    const strengthDiv = document.getElementById('passwordStrength');
    
    if (password.length === 0) {
      strengthDiv.innerHTML = '';
      return;
    }
    
    let strength = 0;
    if (password.length >= 6) strength++;
    if (password.length >= 8) strength++;
    if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
    if (password.match(/[0-9]/)) strength++;
    if (password.match(/[^a-zA-Z0-9]/)) strength++;
    
    if (strength <= 2) {
      strengthDiv.innerHTML = 'Weak password';
      strengthDiv.className = 'password-strength strength-weak';
    } else if (strength <= 4) {
      strengthDiv.innerHTML = 'Medium password';
      strengthDiv.className = 'password-strength strength-medium';
    } else {
      strengthDiv.innerHTML = 'Strong password';
      strengthDiv.className = 'password-strength strength-strong';
    }
  }
</script>

</body>
</html>
